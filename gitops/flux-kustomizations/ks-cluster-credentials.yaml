apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-credentials
  namespace: infra-flux-validation
spec:
  dependsOn:
    - name: flux
      namespace: infra-flux-validation
    - name: external-secrets
      namespace: infra-flux-validation
  interval: 5m0s
  path: ./gitops/cluster-credentials
  prune: true
  serviceAccountName: infra-flux-validation
  sourceRef:
    apiVersion: source.toolkit.fluxcd.io/v1
    kind: GitRepository
    name: flux
    namespace: infra-flux-validation
  timeout: 2m0s
  wait: true

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clusters
  namespace: infra-flux-validation
spec:
  dependsOn:
    - name: workspaces
      namespace: infra-flux-validation
    - name: external-secrets
      namespace: infra-flux-validation
    - name: cluster-credentials
      namespace: infra-flux-validation
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-values
  interval: 10m0s
  path: ./gitops/clusters
  prune: true
  serviceAccountName: infra-flux-validation
  sourceRef:
    apiVersion: source.toolkit.fluxcd.io/v1
    kind: GitRepository
    name: workspaces
    namespace: infra-flux-validation
  timeout: 2m0s
  retryInterval: 1m0s
  wait: true
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clusters
  namespace: infra-flux-validation
spec:
  dependsOn:
    - name: flux
      namespace: infra-flux-validation
    - name: external-secrets
      namespace: infra-flux-validation
    - name: cluster-credentials
      namespace: infra-flux-validation
  interval: 10m0s
  path: ./gitops/clusters
  prune: true
  serviceAccountName: infra-flux-validation
  sourceRef:
    apiVersion: source.toolkit.fluxcd.io/v1
    kind: GitRepository
    name: flux
    namespace: infra-flux-validation

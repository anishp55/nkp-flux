apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
  namespace: infra-flux-validation
spec:
  dependsOn:
    - name: workspaces
      namespace: infra-flux-validation
  interval: 5m0s
  path: ./gitops/external-secrets
  prune: true
  serviceAccountName: infra-flux-validation
  sourceRef:
    apiVersion: source.toolkit.fluxcd.io/v1
    kind: GitRepository
    name: workspaces
    namespace: infra-flux-validation
  timeout: 2m0s
  retryInterval: 1m0s
  wait: true
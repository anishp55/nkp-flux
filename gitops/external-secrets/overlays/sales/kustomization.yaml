apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target: {kind: ServiceAccount, name: eso-secret-reader}
    patch: |-
      - {op: replace, path: /metadata/namespace, value: sales}
  - target: {kind: SecretStore, name: nutanix-provider-01}
    patch: |-
      - {op: replace, path: /metadata/namespace, value: sales}
      - {op: replace, path: /spec/provider/kubernetes/auth/serviceAccount/namespace, value: sales}
  - target: {kind: RoleBinding, name: eso-secret-reader-workspace-template}
    patch: |-
      - {op: replace, path: /metadata/name, value: eso-secret-reader-sales}
      - {op: replace, path: /subjects/0/namespace, value: sales}
